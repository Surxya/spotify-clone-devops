services:
  spotify-frontend:
    image: node:18-alpine
    container_name: spotify_frontend
    command: sh -c "npm install -g serve && serve -s build -l 3000"
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://192.168.31.239:5000
    restart: always

  spotify-backend:
    image: node:18-alpine
    container_name: spotify_backend
    ports:
      - "5000:5000"
    volumes:
      - spotify_media:/app/tracks
      - spotify_db_data:/app/data
    environment:
      - PORT=5000
      - NODE_ENV=production
      - JWT_SECRET=SpotifyMegaSecretKey2026!
    restart: always

volumes:
  spotify_media:
  spotify_db_data:
