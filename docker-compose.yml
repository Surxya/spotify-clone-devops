version: '3.8'

services:
  spotify-frontend:
    image: node:18-alpine
    container_name: spotify_frontend
    command: sh -c "npm install -g serve && serve -s build -l 3000"
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://localhost/api
    restart: always

  spotify-backend:
    build: ./backend
    container_name: spotify_backend
    ports:
      - "5000:5000"
    volumes:
      - spotify_media:/app/tracks
      - spotify_db_data:/app/data
      - ./backend:/app
      - /app/node_modules
    environment:
      - PORT=5000
      - NODE_ENV=production
      - JWT_SECRET=SpotifyMegaSecretKey2026!
    restart: always

  nginx:
    image: nginx:alpine
    container_name: spotify_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d
    depends_on:
      - spotify-frontend
      - spotify-backend

volumes:
  spotify_media:
  spotify_db_data:
